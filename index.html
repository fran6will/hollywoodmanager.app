<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hollywood Talent Manager - Build Your Agency</title>
  <meta name="description" content="Hollywood Talent Manager is a multiplayer talent agency management game. Sign actors, win auditions, sabotage rivals, and climb to the top of Hollywood.">
  <meta name="keywords" content="hollywood game, talent manager, agency game, multiplayer, ios game, mobile game, strategy game">
  <meta property="og:title" content="Hollywood Talent Manager">
  <meta property="og:description" content="Build your talent agency. Sign actors. Win auditions. Dominate Hollywood.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://hollywoodmanager.app">
  <meta name="apple-itunes-app" content="app-id=6760136743">
  <link rel="canonical" href="https://hollywoodmanager.app">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0A0A12;
      color: #ECE8E1;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .container {
      text-align: center;
      padding: 40px 24px;
      max-width: 480px;
    }

    .star {
      font-size: 64px;
      margin-bottom: 24px;
      display: inline-block;
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); }
    }

    h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #D4AF37, #F5D676);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .tagline {
      color: #8888A0;
      font-size: 15px;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .badge {
      display: inline-block;
      background: #1A1A28;
      border: 1px solid #D4AF3744;
      color: #D4AF37;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 20px;
      margin-bottom: 32px;
    }

    .app-store-link {
      display: inline-block;
      transition: transform 0.2s ease;
    }

    .app-store-link:hover {
      transform: scale(1.05);
    }

    .app-store-link img {
      height: 54px;
    }

    .links {
      margin-top: 40px;
      display: flex;
      gap: 24px;
      justify-content: center;
    }

    .links a {
      color: #555568;
      font-size: 13px;
      text-decoration: none;
      transition: color 0.2s;
    }

    .links a:hover {
      color: #8888A0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="star">&#11088;</div>
    <h1>Hollywood Talent Manager</h1>
    <p class="tagline">
      Build your talent agency. Sign actors. Win auditions.<br>
      Dominate Hollywood.
    </p>
    <div class="badge">Coming Soon</div>
    <br>
    <a class="app-store-link" href="https://apps.apple.com/app/id6760136743" aria-label="Download on the App Store">
      <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" alt="Download on the App Store">
    </a>
    <div class="links">
      <a href="/privacy-policy.html">Privacy</a>
      <a href="/support.html">Support</a>
    </div>
  </div>
</body>
</html>
